<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK Farm House LEVEL 5</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Segoe UI; background:#0f172a; color:white; }

.sidebar {
    width:220px; height:100vh; position:fixed;
    background:#020617; padding:20px;
}
.sidebar h2 { color:#10b981; }
.sidebar button {
    width:100%; margin-top:10px;
    padding:10px; border:none;
    background:#1e293b; color:white; cursor:pointer;
}

.main {
    margin-left:240px; padding:20px;
}

.cards { display:flex; gap:10px; flex-wrap:wrap; }

.card {
    flex:1; padding:15px; border-radius:10px;
    text-align:center;
}
.profit{background:#065f46;}
.income{background:#92400e;}
.expense{background:#7f1d1d;}

input,select,button {
    width:100%; padding:10px;
    margin:5px 0; border:none;
    border-radius:8px;
}

.section { display:none; }
.active { display:block; }

table { width:100%; margin-top:10px; }
td,th { padding:8px; text-align:center; }

.alert {
    background:red; padding:10px;
    border-radius:8px; margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>GK FARM</h2>
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('entries')">Entries</button>
    <button onclick="show('analytics')">Analytics</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <div class="cards">
        <div class="card profit">Profit <h2 id="profit"></h2></div>
        <div class="card income">Income <h2 id="income"></h2></div>
        <div class="card expense">Expense <h2 id="expense"></h2></div>
    </div>

    <canvas id="mainChart"></canvas>
    <div id="alertBox"></div>
</div>

<!-- ENTRIES -->
<div id="entries" class="section">
    <h3>Add Entry</h3>
    <input type="date" id="date">
    <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>
    <input type="text" id="particulars" placeholder="Particulars">
    <input type="number" id="qty" placeholder="Egg Qty">
    <input type="number" id="price" placeholder="Price">
    <input type="number" id="amount" readonly placeholder="Auto Amount">
    <button onclick="addEntry()">Add</button>

    <table>
        <thead>
        <tr>
            <th>Date</th><th>Type</th><th>Part</th><th>Amt</th><th>X</th>
        </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="section">
    <h3>Monthly Analytics</h3>
    <canvas id="monthChart"></canvas>
</div>

</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")) || [];

qty.oninput = calc;
price.oninput = calc;

function calc(){
    amount.value = (qty.value * price.value) || 0;
}

function show(sec){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(sec).classList.add("active");
}

function addEntry(){
    let e = {
        id:Date.now(),
        date:date.value,
        type:type.value,
        part:particulars.value,
        amount:Number(amount.value)
    };
    entries.push(e);
    save();
}

function deleteEntry(id){
    entries = entries.filter(e=>e.id!==id);
    save();
}

function save(){
    localStorage.setItem("entries", JSON.stringify(entries));
    update();
}

function update(){

    let inc=0, exp=0;
    let daily={}, monthly={};

    table.innerHTML="";

    entries.forEach(e=>{

        if(e.type=="income") inc+=e.amount;
        else exp+=e.amount;

        // DAILY
        if(!daily[e.date]) daily[e.date]={i:0,e:0};
        if(e.type=="income") daily[e.date].i+=e.amount;
        else daily[e.date].e+=e.amount;

        // MONTHLY
        let m = e.date.slice(0,7);
        if(!monthly[m]) monthly[m]={i:0,e:0};
        if(e.type=="income") monthly[m].i+=e.amount;
        else monthly[m].e+=e.amount;

        table.innerHTML+=`
        <tr>
        <td>${e.date}</td>
        <td>${e.type}</td>
        <td>${e.part}</td>
        <td>${e.amount}</td>
        <td><button onclick="deleteEntry(${e.id})">X</button></td>
        </tr>`;
    });

    income.innerText="₹"+inc;
    expense.innerText="₹"+exp;
    profit.innerText="₹"+(inc-exp);

    // ALERT SYSTEM
    if(exp > inc){
        alertBox.innerHTML = `<div class="alert">⚠ Loss Alert! Expenses exceed income</div>`;
    } else {
        alertBox.innerHTML = "";
    }

    // DAILY CHART
    mainChart.data.labels = Object.keys(daily);
    mainChart.data.datasets[0].data = Object.values(daily).map(d=>d.i);
    mainChart.data.datasets[1].data = Object.values(daily).map(d=>d.e);
    mainChart.update();

    // MONTHLY CHART
    monthChart.data.labels = Object.keys(monthly);
    monthChart.data.datasets[0].data = Object.values(monthly).map(d=>d.i);
    monthChart.data.datasets[1].data = Object.values(monthly).map(d=>d.e);
    monthChart.update();
}

let mainChart = new Chart(document.getElementById("mainChart"),{
    type:'bar',
    data:{labels:[],datasets:[
        {label:"Income",data:[],backgroundColor:"green"},
        {label:"Expense",data:[],backgroundColor:"red"}
    ]}
});

let monthChart = new Chart(document.getElementById("monthChart"),{
    type:'line',
    data:{labels:[],datasets:[
        {label:"Income",data:[],borderColor:"green"},
        {label:"Expense",data:[],borderColor:"red"}
    ]}
});

update();

/* PDF */
function downloadPDF(){
    const {jsPDF}=window.jspdf;
    let doc=new jsPDF();

    doc.text("GK FARM REPORT",20,20);

    let y=40;
    entries.forEach(e=>{
        doc.text(`${e.date} | ${e.type} | ₹${e.amount}`,20,y);
        y+=10;
    });

    doc.save("report.pdf");
}
</script>

</body>
</html>
