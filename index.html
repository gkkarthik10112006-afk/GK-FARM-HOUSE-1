<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK Farm House ULTRA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a,#020617);
    color:white;
}

/* Sidebar */
.sidebar {
    width:230px;
    height:100vh;
    position:fixed;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding:20px;
    border-right:1px solid rgba(255,255,255,0.1);
}
.sidebar h2 {
    color:#22c55e;
    letter-spacing:1px;
}
.sidebar button {
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    transition:0.3s;
}
.sidebar button:hover {
    background:#22c55e;
    transform:scale(1.05);
}

/* Main */
.main {
    margin-left:250px;
    padding:25px;
}

/* Cards */
.cards {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card {
    flex:1;
    padding:20px;
    border-radius:15px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.profit { border-left:5px solid #10b981; }
.income { border-left:5px solid #f59e0b; }
.expense { border-left:5px solid #ef4444; }

/* Inputs */
input,select,button {
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

/* Sections */
.section { display:none; }
.active { display:block; }

/* Table */
table {
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}
td,th {
    padding:12px;
    text-align:center;
}
tr {
    background:rgba(255,255,255,0.03);
}
tr:hover {
    background:rgba(255,255,255,0.08);
}

/* Buttons */
.action-btn {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.edit { background:#3b82f6; }
.delete { background:#ef4444; }

.export-btn {
    margin-top:15px;
    background:#22c55e;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>GK FARM</h2>
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('entries')">Entries</button>
    <button onclick="downloadPDF()">Export PDF</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <div class="cards">
        <div class="card profit">Profit <h2 id="profit"></h2></div>
        <div class="card income">Income <h2 id="income"></h2></div>
        <div class="card expense">Expense <h2 id="expense"></h2></div>
    </div>

    <canvas id="mainChart"></canvas>
</div>

<!-- ENTRIES -->
<div id="entries" class="section">
    <h3>Add Entry</h3>

    <input type="date" id="date">
    <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>

    <input type="text" id="particulars" placeholder="Particulars">
    <input type="number" id="qty" placeholder="Qty">
    <input type="number" id="price" placeholder="Price">
    <input type="number" id="amount" readonly placeholder="Auto Amount">

    <button onclick="addEntry()">Add Entry</button>

    <table>
        <thead>
        <tr>
            <th>Date</th><th>Type</th><th>Part</th><th>Amt</th><th>Action</th>
        </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")) || [];
let editId = null;

qty.oninput = calc;
price.oninput = calc;

function calc(){
    amount.value = (qty.value * price.value) || 0;
}

function show(sec){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(sec).classList.add("active");
}

function addEntry(){

    if(editId){
        entries = entries.map(e=>{
            if(e.id===editId){
                e.date=date.value;
                e.type=type.value;
                e.part=particulars.value;
                e.amount=Number(amount.value);
            }
            return e;
        });
        editId=null;
    } else {
        entries.push({
            id:Date.now(),
            date:date.value,
            type:type.value,
            part:particulars.value,
            amount:Number(amount.value)
        });
    }

    save();
}

function editEntry(id){
    let e = entries.find(x=>x.id===id);
    date.value=e.date;
    type.value=e.type;
    particulars.value=e.part;
    amount.value=e.amount;
    editId=id;
}

function deleteEntry(id){
    entries = entries.filter(e=>e.id!==id);
    save();
}

function save(){
    localStorage.setItem("entries", JSON.stringify(entries));
    update();
}

function update(){

    let inc=0, exp=0;
    table.innerHTML="";

    entries.forEach(e=>{

        if(e.type=="income") inc+=e.amount;
        else exp+=e.amount;

        table.innerHTML+=`
        <tr>
        <td>${e.date}</td>
        <td>${e.type}</td>
        <td>${e.part}</td>
        <td>₹${e.amount}</td>
        <td>
            <button class="action-btn edit" onclick="editEntry(${e.id})">✏</button>
            <button class="action-btn delete" onclick="deleteEntry(${e.id})">🗑</button>
        </td>
        </tr>`;
    });

    income.innerText="₹"+inc;
    expense.innerText="₹"+exp;
    profit.innerText="₹"+(inc-exp);

    mainChart.data.labels=["Income","Expense"];
    mainChart.data.datasets[0].data=[inc,exp];
    mainChart.update();
}

let mainChart = new Chart(document.getElementById("mainChart"),{
    type:'bar',
    data:{
        labels:[],
        datasets:[{data:[],backgroundColor:["green","red"]}]
    }
});

update();

/* PDF */
function downloadPDF(){
    const {jsPDF}=window.jspdf;
    let doc=new jsPDF();

    doc.setFontSize(18);
    doc.text("GK FARM HOUSE REPORT",20,20);

    let y=40;

    entries.forEach(e=>{
        doc.setFontSize(12);
        doc.text(`${e.date} | ${e.type} | ${e.part} | ₹${e.amount}`,20,y);
        y+=10;
    });

    doc.save("GK_Farm_Report.pdf");
}
</script>

</body>
</html>
